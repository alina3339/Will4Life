<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estate Planner</title>
<meta name="description" content="UK Estate Planning Suite - Will Writing, Power of Attorney, Trust Planning, Estate Planning, Inheritance Tax. GDPR Compliant.">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap">
</head>
<body>
<div id="boot">Estate Planner<div class="sub" id="boot-sub">Starting up...</div></div>
<div id="app" class="hidden">
  <header class="hdr" id="hdr"></header>
  <div class="sb" id="statusbar"></div>
  <nav class="nv hidden" id="nav"></nav>
  <main class="mn" id="main"></main>
  <footer class="ft" id="ftr"></footer>
</div>

<!-- Error catcher - runs first, tiny, cannot fail -->
<script>
window.onerror = function(m, u, l) {
  var el = document.getElementById("boot-sub");
  if (el) el.innerHTML = '<div style="color:#f87171;margin-top:16px;font-size:13px">Error line ' + l + ': ' + m + '<br><button onclick="location.reload()" style="margin-top:10px;padding:8px 20px;background:#fff;color:#1a2a3a;border:none;border-radius:6px;font-weight:600;cursor:pointer">Reload</button></div>';
  return false;
};
setTimeout(function() {
  var b = document.getElementById("boot");
  if (b && b.style.display !== "none") {
    document.getElementById("boot-sub").innerHTML = "Taking longer than expected.<br><small>Check browser console for errors (F12)</small>";
  }
}, 4000);
</script>

<!-- Browser storage API (IndexedDB) - must load before app.js -->
<script src="storage.js"></script>

<!-- Main application -->
<script src="app.js"></script>
</body>
</html>
